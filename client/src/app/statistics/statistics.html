<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phoenix - Statistics</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
</head>

<body>
    <nav-sidebar active="statistics"></nav-sidebar>

    <main class="container py-4">
        <div class="mb-4">
            <h1 class="h2 mb-1">Statistics</h1>
            <p class="text-secondary mb-0">Your work and abandonment habits, in numbers.</p>
        </div>

        <div id="alertContainer"></div>

        <div class="row row-cols-1 row-cols-md-2 g-4">
            <div class="col">
                <div class="card h-100">
                    <div class="card-body">
                        <h3 class="h6 fst-italic">Projects by category</h3>
                        <div id="chartCategory"></div>
                    </div>
                </div>
            </div>
            <div class="col">
                <div class="card h-100">
                    <div class="card-body">
                        <h3 class="h6 fst-italic">Reasons for abandonment</h3>
                        <div id="chartReasons"></div>
                    </div>
                </div>
            </div>
            <div class="col">
                <div class="card h-100">
                    <div class="card-body">
                        <h3 class="h6 fst-italic">Completed by year</h3>
                        <div id="chartCompleted"></div>
                    </div>
                </div>
            </div>
            <div class="col">
                <div class="card h-100 text-center">
                    <div class="card-body d-flex flex-column justify-content-center">
                        <h3 class="h6 fst-italic">Average time before abandoning</h3>
                        <p class="display-5 font-mono text-primary-emphasis mb-0" id="avgTimeValue">—</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./statistics.js"></script>
    <script type="module" src="../../components/nav-sidebar.js"></script>
</body>

</html>
