<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phoenix - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
</head>

<body>
    <nav-sidebar active="dashboard"></nav-sidebar>

    <main class="container py-4">
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
            <div>
                <h1 class="h2 mb-1" id="greeting">Hello</h1>
                <p class="text-secondary mb-0">Here's the state of your projects today.</p>
            </div>
            <a href="project-form.html" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>New project</a>
        </div>

        <div id="alertContainer"></div>

        <div id="summaryContainer" class="row row-cols-1 row-cols-md-3 g-3 mb-4"></div>

        <div class="row g-4">
            <div class="col-lg-7">
                <h2 class="h5 fst-italic">Recent activity</h2>
                <div class="card">
                    <div class="card-body p-0" id="activityContainer"></div>
                </div>
            </div>
            <div class="col-lg-5">
                <h2 class="h5 fst-italic">Upcoming goals</h2>
                <div class="card">
                    <div class="card-body p-0" id="goalsContainer"></div>
                </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/pages/dashboard.js"></script>
    <script type="module" src="../../components/nav-sidebar.js"></script>
</body>

</html>
