<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phoenix - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
</head>

<body>
    <nav-sidebar active="dashboard"></nav-sidebar>

    <div class="app-shell">
        <aside class="sidebar">
            <a href="dashboard.html" class="wordmark"><span class="ember-dot"></span> Phoenix</a>
            <ul class="sidebar-nav">
                <li><a href="dashboard.html" class="active"><i class="bi bi-grid"></i> Dashboard</a></li>
                <li><a href="projects.html"><i class="bi bi-folder2-open"></i> Projects</a></li>
                <li><a href="categories.html"><i class="bi bi-tags"></i> Categories</a></li>
                <li><a href="statistics.html"><i class="bi bi-bar-chart"></i> Statistics</a></li>
                <li><a href="search.html"><i class="bi bi-search"></i> Search</a></li>
                <li><a href="profile.html"><i class="bi bi-person-circle"></i> Profile</a></li>
            </ul>
            <div class="sidebar-footer">
                <button id="logoutBtn" class="btn-ghost w-100"><i class="bi bi-box-arrow-right"></i> Log out</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="page-header">
                <div>
                    <h1 id="greeting">Hello</h1>
                    <p>Here's the state of your projects today.</p>
                </div>
                <a href="project-form.html" class="btn-primary"><i class="bi bi-plus-lg"></i> New project</a>
            </div>

            <div id="alertContainer"></div>

            <div id="summaryContainer" class="project-grid mb-4"></div>

            <div class="row g-4">
                <div class="col-lg-7">
                    <h2 class="section-title" style="margin-top:0;">Recent activity</h2>
                    <div class="card-phoenix p-3" id="activityContainer"></div>
                </div>
                <div class="col-lg-5">
                    <h2 class="section-title" style="margin-top:0;">Upcoming goals</h2>
                    <div class="card-phoenix p-3" id="goalsContainer"></div>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/pages/dashboard.js"></script>
    <script type="module" src="../../components/nav-sidebar.js"></script>
</body>

</html>
