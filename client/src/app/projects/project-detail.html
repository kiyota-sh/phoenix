<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Project details" />
    <meta name="author" content="Albi Sanches y Camilo Solarte" />
    <meta name="keywords"
        content="project management, abandoned projects, productivity, personal projects tracker, Phoenix" />
    <meta name="theme-color" content="#18171D" />
    <link rel="icon" type="image/svg+xml" href="/client/src/assets/favicon.svg" />
    <title>Phoenix - Project detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
</head>

<body>
    <nav-sidebar active="projects"></nav-sidebar>

    <main class="container py-4">
        <a href="projects.html" class="text-secondary small text-decoration-none"><i
                class="bi bi-arrow-left me-1"></i>Back to projects</a>
        <div id="alertContainer" class="mt-3"></div>
        <div id="detailContainer" class="text-center py-5">
            <div class="spinner-border text-primary" role="status"><span class="visually-hidden">Loading...</span></div>
        </div>

        <form id="taskForm" class="row g-2 mb-3">
            <div class="col-8 col-md-9">
                <input type="text" id="taskTitle" class="form-control" placeholder="Add a task..." required
                    maxlength="140" />
            </div>
            <div class="col-4 col-md-2">
                <select id="taskWeight" class="form-select" title="Weight (impact on progress)">
                    <option value="1">Weight: 1</option>
                    <option value="2">Weight: 2</option>
                    <option value="3" selected>Weight: 3</option>
                    <option value="4">Weight: 4</option>
                    <option value="5">Weight: 5</option>
                </select>
            </div>
            <div class="col-12 col-md-1 d-grid">
                <button type="submit" class="btn btn-primary">Add</button>
            </div>
        </form>
        <p class="text-secondary small mt-n2 mb-3">Higher weight = bigger impact on the progress bar. Use it for tasks
            that matter more than others.</p>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../../components/nav-sidebar.js"></script>
    <script type="module" src="./project-detail.js"></script>
</body>

</html>
