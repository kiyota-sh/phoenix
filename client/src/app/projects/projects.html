<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phoenix - Projects</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="css/styles.css" />
</head>

<body>
    <nav class="navbar navbar-expand-lg navbar-dark border-bottom" style="background-color: var(--bs-tertiary-bg);">
        <div class="container-fluid">
            <a class="navbar-brand wordmark" href="dashboard.html"><span class="ember-dot"></span>Phoenix</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navMain">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="dashboard.html"><i
                                class="bi bi-grid me-1"></i>Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="projects.html"><i
                                class="bi bi-folder2-open me-1"></i>Projects</a></li>
                    <li class="nav-item"><a class="nav-link" href="categories.html"><i
                                class="bi bi-tags me-1"></i>Categories</a></li>
                    <li class="nav-item"><a class="nav-link" href="statistics.html"><i
                                class="bi bi-bar-chart me-1"></i>Statistics</a></li>
                    <li class="nav-item"><a class="nav-link" href="search.html"><i
                                class="bi bi-search me-1"></i>Search</a></li>
                    <li class="nav-item"><a class="nav-link" href="profile.html"><i
                                class="bi bi-person-circle me-1"></i>Profile</a></li>
                </ul>
                <button id="logoutBtn" class="btn btn-outline-secondary btn-sm"><i
                        class="bi bi-box-arrow-right me-1"></i>Log out</button>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
            <div>
                <h1 class="h2 mb-1">Projects</h1>
                <p class="text-secondary mb-0">Everything you started, in one place.</p>
            </div>
            <a href="project-form.html" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>New project</a>
        </div>

        <div id="alertContainer"></div>

        <form id="filtersForm" class="row g-2 mb-4">
            <div class="col-md-4"><input type="text" id="filterQuery" class="form-control"
                    placeholder="Search by name..." /></div>
            <div class="col-md-3"><select id="filterCategory" class="form-select">
                    <option value="">All categories</option>
                </select></div>
            <div class="col-md-3">
                <select id="filterStatus" class="form-select">
                    <option value="">All statuses</option>
                    <option value="active">Active</option>
                    <option value="abandoned">Abandoned</option>
                    <option value="completed">Completed</option>
                </select>
            </div>
            <div class="col-md-2">
                <select id="filterPriority" class="form-select">
                    <option value="">All priorities</option>
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                </select>
            </div>
        </form>

        <div id="resultsContainer"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="js/pages/projects.js"></script>
</body>

</html>
