<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="All projects" />
    <meta name="author" content="Albi Sanches y Camilo Solarte" />
    <meta name="keywords"
        content="project management, abandoned projects, productivity, personal projects tracker, Phoenix" />
    <meta name="theme-color" content="#18171D" />
    <link rel="icon" type="image/svg+xml" href="/client/src/assets/favicon.svg" />
    <title>Phoenix - Projects</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
</head>

<body>
    <nav-sidebar active="projects"></nav-sidebar>

    <main class="container py-4">
        <div class="d-flex justify-content-between align-items-start flex-wrap gap-3 mb-4">
            <div>
                <h1 class="h2 mb-1">Projects</h1>
                <p class="text-secondary mb-0">Everything you started, in one place.</p>
            </div>
            <a href="../projects/project-form.html" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>New project</a>
        </div>

        <div id="alertContainer"></div>

        <form id="filtersForm" class="row g-2 mb-4">
            <div class="col-md-4"><input type="text" id="filterQuery" class="form-control"
                    placeholder="Search by name..." /></div>
            <div class="col-md-3"><select id="filterCategory" class="form-select">
                    <option value="">All categories</option>
                </select></div>
            <div class="col-md-3">
                <select id="filterStatus" class="form-select">
                    <option value="">All statuses</option>
                    <option value="activo">Active</option>
                    <option value="abandonado">Abandoned</option>
                    <option value="finalizado">Completed</option>
                    <option value="archivado">Archived</option>
                </select>
            </div>
            <div class="col-md-2">
                <select id="filterPriority" class="form-select">
                    <option value="">All priorities</option>
                    <option value="alta">High</option>
                    <option value="media">Medium</option>
                    <option value="baja">Low</option>
                </select>
            </div>
        </form>

        <div id="resultsContainer"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./projects.js"></script>
    <script type="module" src="../../components/nav-sidebar.js"></script>
</body>

</html>
