<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Project form (create edit)" />
    <meta name="author" content="Albi Sanches y Camilo Solarte" />
    <meta name="keywords"
        content="project management, abandoned projects, productivity, personal projects tracker, Phoenix" />
    <meta name="theme-color" content="#18171D" />
    <link rel="icon" type="image/svg+xml" href="/client/src/assets/favicon.svg" />
    <title>Phoenix - New project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
</head>

<body>
    <nav-sidebar active="projects"></nav-sidebar>

    <main class="container py-4" style="max-width: 700px;">
        <div class="mb-4">
            <h1 class="h2 mb-1" id="formTitle">New project</h1>
            <p class="text-secondary mb-0">Log the goal and context so you can pick it back up later.</p>
        </div>

        <div id="alertContainer"></div>

        <form id="projectForm" class="card p-4">
            <div class="mb-3">
                <label for="name" class="form-label">Project name *</label>
                <input type="text" id="name" class="form-control" required maxlength="120" />
            </div>

            <div class="mb-3">
                <label for="description" class="form-label">Description</label>
                <textarea id="description" class="form-control" rows="3"></textarea>
            </div>

            <div class="mb-3">
                <label for="goal" class="form-label">Goal</label>
                <textarea id="goal" class="form-control" rows="2"
                    placeholder="What were you trying to achieve with this project?"></textarea>
            </div>

            <div class="row g-3 mb-3">
                <div class="col-md-6">
                    <label for="category" class="form-label">Category *</label>
                    <select id="category" class="form-select" required></select>
                </div>
                <div class="col-md-6">
                    <label for="priority" class="form-label">Priority *</label>
                    <select id="priority" class="form-select" required>
                        <option value="baja">Low</option>
                        <option value="media" selected>Medium</option>
                        <option value="alta">High</option>
                    </select>
                </div>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-md-6">
                    <label for="startDate" class="form-label">Start date *</label>
                    <input type="date" id="startDate" class="form-control" required />
                </div>
                <div class="col-md-6">
                    <label for="targetDate" class="form-label">Target date</label>
                    <input type="date" id="targetDate" class="form-control" />
                </div>
            </div>

            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary" id="submitBtn">Create project</button>
                <a href="projects.html" class="btn btn-outline-secondary">Cancel</a>
            </div>
        </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="../../components/nav-sidebar.js"></script>
    <script type="module" src="./project-form.js"></script>
</body>

</html>
