<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Search projects" />
    <meta name="author" content="Albi Sanches y Camilo Solarte" />
    <meta name="keywords"
        content="project management, abandoned projects, productivity, personal projects tracker, Phoenix" />
    <meta name="theme-color" content="#18171D" />
    <link rel="icon" type="image/svg+xml" href="/client/src/assets/favicon.svg" />
    <title>Phoenix - Search</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
</head>

<body>
    <nav-sidebar active="search"></nav-sidebar>

    <main class="container py-4">
        <div class="mb-4">
            <h1 class="h2 mb-1">Search</h1>
            <p class="text-secondary mb-0">Find any project, active or abandoned.</p>
        </div>

        <form id="searchForm" class="row g-2 mb-4">
            <div class="col-md-7"><input type="text" id="searchQuery" class="form-control" placeholder="Project name..."
                    autofocus /></div>
            <div class="col-md-3">
                <select id="searchStatus" class="form-select">
                    <option value="">All statuses</option>
                    <option value="active">Active</option>
                    <option value="abandoned">Abandoned</option>
                    <option value="completed">Completed</option>
                </select>
            </div>
            <div class="col-md-2"><button type="submit" class="btn btn-primary w-100">Search</button></div>
        </form>

        <div id="alertContainer"></div>
        <div id="resultsContainer"></div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./search.js"></script>
    <script type="module" src="../../components/nav-sidebar.js"></script>
</body>

</html>
