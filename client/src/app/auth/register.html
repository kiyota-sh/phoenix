<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phoenix - Create account</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../../css/styles.css" />
</head>

<body>
    <div class="container-fluid">
        <div class="row vh-100">
            <div class="col-lg-6 d-none d-lg-flex flex-column justify-content-center text-white p-5 auth-visual">
                <a href="../login/login.html" class="wordmark text-white mb-5"><span
                        class="ember-dot"></span>Phoenix</a>
                <h1 class="display-6">Continue what really matters.</h1>
                <p class="text-white-50 col-lg-9">Create your account and start documenting every project: its progress,
                    its pauses, and the way back.</p>
            </div>

            <div class="col-lg-6 d-flex align-items-center justify-content-center p-4">
                <div class="card p-4" style="max-width: 380px; width: 100%;">
                    <h2 class="h4 mb-1">Create your account</h2>
                    <p class="text-secondary mb-4">It's free and takes less than a minute.</p>

                    <div id="alertContainer"></div>

                    <form id="registerForm">
                        <div class="mb-3">
                            <label for="name" class="form-label">Name</label>
                            <input type="text" id="name" class="form-control" required />
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email address</label>
                            <input type="email" id="email" class="form-control" required />
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" id="password" class="form-control" required minlength="8" />
                        </div>
                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label">Confirm password</label>
                            <input type="password" id="confirmPassword" class="form-control" required minlength="8" />
                        </div>
                        <button type="submit" class="btn btn-primary w-100" id="submitBtn">Create account</button>
                    </form>

                    <p class="text-center mt-4 small mb-0">
                        Already have an account? <a href="../login/login.html">Sign in</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./register.js"></script>
</body>

</html>
