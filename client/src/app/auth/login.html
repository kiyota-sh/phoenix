<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Phoenix - Sign in</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="../../css/styles.css" />
</head>

<body>
    <div class="container-fluid">
        <div class="row vh-100">
            <div class="col-lg-6 d-none d-lg-flex flex-column justify-content-center text-white p-5 auth-visual">
                <a href="login.html" class="wordmark text-white mb-5"><span class="ember-dot"></span>Phoenix</a>
                <h1 class="display-6">Recover what you started.</h1>
                <p class="text-white-50 col-lg-9">Phoenix keeps the full context of your abandoned projects: the
                    progress, the reason, and the exact moment you left them.</p>
            </div>

            <div class="col-lg-6 d-flex align-items-center justify-content-center p-4">
                <div class="card p-4" style="max-width: 380px; width: 100%;">
                    <h2 class="h4 mb-1">Welcome back</h2>
                    <p class="text-secondary mb-4">Sign in to continue your projects.</p>

                    <div id="alertContainer"></div>

                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email address</label>
                            <input type="email" id="email" class="form-control" required />
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" id="password" class="form-control" required />
                        </div>
                        <button type="submit" class="btn btn-primary w-100" id="submitBtn">Sign in</button>
                    </form>

                    <p class="text-center mt-4 small mb-0">
                        Don't have an account? <a href="../register/register.html">Sign up</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./login.js"></script>
</body>

</html>
