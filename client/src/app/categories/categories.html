<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Categories" />
    <meta name="author" content="Albi Sanches y Camilo Solarte" />
    <meta name="keywords"
        content="project management, abandoned projects, productivity, personal projects tracker, Phoenix" />
    <meta name="theme-color" content="#18171D" />
    <link rel="icon" type="image/svg+xml" href="/client/src/assets/favicon.svg" />
    <title>Phoenix - Categories</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
</head>

<body>
    <nav-sidebar active="categories"></nav-sidebar>

    <main class="container py-4" style="max-width: 640px;">
        <div class="mb-4">
            <h1 class="h2 mb-1">Categories</h1>
            <p class="text-secondary mb-0">Organize your projects by area.</p>
        </div>

        <div id="alertContainer"></div>

        <form id="categoryForm" class="input-group mb-4">
            <input type="text" id="categoryName" class="form-control" placeholder="Category name" required />
            <button type="submit" class="btn btn-primary">Add</button>
        </form>

        <div class="card">
            <div class="card-body p-0" id="categoryList"></div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./categories.js"></script>
    <script type="module" src="../../components/nav-sidebar.js"></script>
</body>

</html>
