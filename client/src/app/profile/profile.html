<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="User profile" />
    <meta name="author" content="Albi Sanches y Camilo Solarte" />
    <meta name="keywords"
        content="project management, abandoned projects, productivity, personal projects tracker, Phoenix" />
    <meta name="theme-color" content="#18171D" />
    <link rel="icon" type="image/svg+xml" href="/client/src/assets/favicon.svg" />
    <title>Phoenix - Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
    <link rel="stylesheet" href="../css/styles.css" />
</head>

<body>
    <nav-sidebar active="projects"></nav-sidebar>

    <main class="container py-4" style="max-width: 520px;">
        <div class="mb-4">
            <h1 class="h2 mb-1">Profile</h1>
            <p class="text-secondary mb-0">Your account information.</p>
        </div>

        <div id="alertContainer"></div>

        <form id="profileForm" class="card p-4">
            <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input type="text" id="name" class="form-control" required />
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email address</label>
                <input type="email" id="email" class="form-control" required />
            </div>
            <button type="submit" class="btn btn-primary" id="submitBtn">Save changes</button>
        </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script type="module" src="./profile.js"></script>
    <script type="module" src="../../components/nav-sidebar.js"></script>
</body>

</html>
